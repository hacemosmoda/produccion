<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <title>Ingreso - Grupo TDM</title>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://stackpath.bootstrapcdn.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>

  <!-- ── Vendor CSS ── -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></noscript>

  <!-- ── App CSS ── -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/mobile.css">

  <!-- ── Escudo de Seguridad ── -->
  <script>
    (function(){
      const s = localStorage.getItem('sispro_user');
      if(!s || s==='undefined' || s==='null') window.location.replace('login.html');
    })();
  </script>

  <style>
    .wrapper-dashboard {
      margin-top: 80px;
      max-width: 1400px;
      width: 96%;
      margin-left: auto;
      margin-right: auto;
      padding: 2rem;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
    }
    @media (min-width: 768px) {
      .wrapper-dashboard { margin-top: 100px; padding: 3rem; }
    }
    @media (max-width: 767px) {
      .wrapper-dashboard {
        width: 100%; border-radius: 0;
        border-left: none; border-right: none; box-shadow: none;
      }
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-text-main);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-text-label);
    }

    .empty-state i {
      font-size: 4rem;
      color: var(--color-primary);
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text-main);
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
       ══════════════════════════════════════════════════════════════════════ -->
  <div class="wrapper-dashboard">
    <h1 class="page-title">
      <i class="fas fa-sign-in-alt"></i>
      Módulo de Ingreso
    </h1>

    <!-- Estado vacío temporal -->
    <div class="empty-state">
      <i class="fas fa-box-open"></i>
      <h3>Módulo en Construcción</h3>
      <p>Este módulo está disponible exclusivamente para administradores y usuarios de ingreso. El contenido se agregará próximamente.</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════
       SCRIPTS
       ══════════════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notifications.js"></script>

  <script>
    // Verificación de permisos al cargar la página
    window.addEventListener('load', async () => {
      try {
        const currentUser = JSON.parse(localStorage.getItem('sispro_user'));
        const userRole = currentUser?.ROL || '';

        // Solo ADMIN y USER-I tienen acceso
        if (userRole !== 'ADMIN' && userRole !== 'USER-I') {
          await Swal.fire({
            icon: 'error',
            title: 'Acceso Denegado',
            text: 'No tienes permisos para acceder a este módulo.',
            confirmButtonColor: '#3F51B5'
          });
          window.location.replace('index.html');
        }
      } catch (error) {
        console.error('Error verificando permisos:', error);
        window.location.replace('login.html');
      }
    });
  </script>
</body>

</html>
