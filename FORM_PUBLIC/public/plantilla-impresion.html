<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reporte de Novedad - Impresión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            margin: 0;
            padding: 10px;
            background: #fff;
            line-height: 1.2;
            font-size: 12px;
            /* Escudo de Seguridad */
            opacity: 0 !important;
            visibility: hidden !important;
        }
        body.auth-shield-pass {
            opacity: 1 !important;
            visibility: visible !important;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            min-height: 96vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border: 1.5px dashed #3F51B5;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #fdfdfe;
            gap: 15px;
        }

        .header h1 {
            color: #3F51B5;
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header .folio {
            margin: 3px 0 0;
            color: #3F51B5;
            font-size: 13px;
            font-weight: 600;
        }

        .header .folio span {
            font-family: monospace;
        }

        .header-right {
            text-align: right;
            font-size: 12px;
        }

        .header-right p {
            margin: 1px 0;
        }

        .status-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 10px;
            color: white;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* SECCIONES Y TABLAS */
        .section {
            padding: 10px;
            margin-bottom: 8px;
            background: #fff;
            border-radius: 6px;
            border: 1px solid #eee;
            page-break-inside: avoid;
        }

        .section-box {
            background: #f8f9fc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .section-dashed {
            border: 1.5px dashed #3F51B5;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .section h3 {
            margin: 0 0 6px 0;
            font-size: 11px;
            text-transform: uppercase;
            color: #3F51B5;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
            font-weight: 800;
        }

        table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }

        .table-data td {
            padding: 2px 4px;
            vertical-align: top;
        }

        .table-grid td {
            padding: 6px;
            border: 1px solid #f1f3f5;
        }

        .table-grid td.label {
            background: #f1f3f5;
            font-weight: bold;
            width: 120px;
        }

        .text-danger {
            color: #d32f2f;
        }

        .text-muted {
            color: #666;
            font-size: 11px;
        }

        /* EVIDENCIA */
        .evidencia-container {
            text-align: center;
            margin-top: 10px;
        }

        .evidencia-container img {
            max-width: 100%;
            max-height: 350px;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 3px;
        }

        /* FIRMAS */
        .firmas {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            text-align: center;
            page-break-inside: avoid;
        }

        .firma-box {
            width: 45%;
        }

        .firma-line {
            border-bottom: 1.5px solid #000;
            height: 30px;
            margin-bottom: 6px;
        }

        .firma-leyenda {
            font-size: 10px;
            font-weight: bold;
            margin: 0;
        }

        /* OPCIONES DE COBRO */
        .opciones-cobro {
            margin: 8px 0;
            padding: 8px 10px;
            border: 1.5px solid #3F51B5;
            background: #f8f9fc;
            border-radius: 6px;
            page-break-inside: avoid;
        }

        .opciones-cobro h3 {
            margin: 0 0 6px 0;
            font-size: 11px;
            color: #3F51B5;
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 3px;
            font-weight: 800;
        }

        .opciones-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .opcional-item span {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 1.5px solid #3F51B5;
            border-radius: 3px;
            vertical-align: middle;
            margin-left: 6px;
            background: #fff;
        }

        @media print {
            body {
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .status-badge,
            .table-grid td.label,
            .section-box {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }

        .no-print {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }

        .btn-print {
            background: #3F51B5;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(63, 81, 181, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 24px;
        }

        .btn-print:hover {
            background: #303F9F;
            transform: scale(1.1) rotate(5deg);
        }
    </style>

    <!-- ── Escudo de Seguridad (Bloqueo Agresivo) ── -->
    <script>
        (function(){
            const s = localStorage.getItem('sispro_user');
            if(!s || s==='undefined' || s==='null') {
                window.location.replace('login.html');
                return;
            }
            
            try {
                const user = JSON.parse(s);
                const role = user.ROL;
                if (role !== 'ADMIN' && role !== 'MODERATOR' && role !== 'USER-P') {
                    window.location.replace('index.html');
                }
            } catch (e) {
                window.location.replace('login.html');
            }
        })();
    </script>
</head>

<body>
    <div class="no-print">
        <button class="btn-print" onclick="window.print()" title="Imprimir Reporte">
            <i class="fas fa-print"></i>
        </button>
    </div>

    <div class="container" id="reportContent">
        <!-- Renderizado dinámico aquí -->
    </div>

    <script>
        // Aplicar escudo visual ya validado en el head
        document.body.classList.add('auth-shield-pass');

        // Cargar datos del LocalStorage enviados desde resolucion.js
        const novData = localStorage.getItem('printNovedad');
        const plantaData = localStorage.getItem('printPlanta');

        if (!novData) {
            document.getElementById('reportContent').innerHTML = '<h3 style="color:red; text-align:center;">Error: No hay datos recibidos para imprimir. Vuelve a intentarlo desde la tabla.</h3>';
        } else {
            const nov = JSON.parse(novData);
            const infoPlanta = plantaData ? JSON.parse(plantaData) : null;
            renderHTML(nov, infoPlanta);

            // Auto impresión ligera luego de cargar imagen
            setTimeout(() => { window.print(); }, 500);
        }

        function renderHTML(nov, infoPlanta) {
            const getColor = (estado) => {
                if (estado === 'FINALIZADO') return '#388e3c';
                if (estado === 'ELABORACION') return '#f57c00';
                return '#d32f2f'; // PENDIENTE o vacíos
            };

            const html = `
                <div style="flex: 1;">
                    <div class="header" style="justify-content: flex-start; gap: 12px; align-items: flex-start;">

                        <div style="display: flex; flex-direction: column; justify-content: space-between; height: 75px; flex: 1;">

                            <p class="folio" style="margin: 0; line-height: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 800; color: #3F51B5;">${nov.ID_NOVEDAD || 'SIN REGISTRO'}</p>
                            <p style="font-size: 10px; font-weight: 700; color: #333; margin: 0; line-height: 1;">${formatearFecha(nov.FECHA || nov.TIMESTAMP)}</p>
                            <div style="margin: 0; line-height: 1;">
                                <span class="status-badge" style="background: ${getColor(nov.ESTADO)}; font-size: 9px; padding: 2px 10px; border-radius: 2px; text-transform: uppercase;">
                                    ${nov.ESTADO || 'PENDIENTE'}
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Datos de Producción e Información del Taller -->
                    <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                        <!-- Datos de Producción -->
                        <div class="section section-dashed" style="flex: 1; margin: 0;">
                            <h3>Datos de Producción</h3>
                            <table class="table-data">
                                <tr>
                                    <td><strong>OP:</strong> ${nov.LOTE || 'N/A'}</td>
                                    <td><strong>Referencia:</strong> ${nov.REFERENCIA || 'N/A'}</td>
                                </tr>
                                <tr>
                                    <td><strong>Línea:</strong> ${nov.LINEA || 'N/A'}</td>
                                    <td><strong>Proceso:</strong> ${nov.PROCESO || 'N/A'}</td>
                                </tr>
                                <tr>
                                    <td><strong>Cantidad:</strong> ${nov.CANTIDAD || '0'}</td>
                                    <td></td>
                                </tr>
                                <tr>
                                    <td colspan="2"><strong>Salida:</strong> 
                                        ${nov.SALIDA ? `${formatearFecha(nov.SALIDA)} 
                                        <span class="text-danger" style="font-size:0.85em;">
                                            (Hace ${calcularDiasHabilesHastaHoy(nov.SALIDA)} días hábiles)
                                        </span>` : 'N/A'}
                                    </td>
                                </tr>
                            </table>
                        </div>

                        <!-- Información del Taller / Planta -->
                        <div class="section section-dashed" style="flex: 1; margin: 0;">
                            <h3>Información del Taller</h3>
                            ${infoPlanta ? `
                                <table class="table-data">
                                    <tr>
                                        <td colspan="2"><strong>Planta:</strong> ${infoPlanta.PLANTA || nov.PLANTA}</td>
                                    </tr>
                                    <tr>
                                        <td colspan="2"><strong>Nit ó Cédula:</strong> ${formatearCedulaNit(infoPlanta.ID_PLANTA)}</td>
                                    </tr>
                                    <tr>
                                        <td colspan="2"><strong>Teléfono:</strong> ${formatearTelefono(infoPlanta.TELEFONO)}</td>
                                    </tr>
                                    <tr>
                                        <td colspan="2"><strong>Dirección:</strong> ${infoPlanta.DIRECCION}</td>
                                    </tr>
                                </table>
                            ` : `
                                <div style="padding: 8px; background: #fff3f3; border: 1px solid #ffcdd2; color: #b71c1c; border-radius: 4px; font-size: 10px;">
                                    <i class="fas fa-exclamation-triangle me-2"></i> No se encontraron datos de contacto registrados para esta planta.
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- Detalle de la Novedad -->
                    <div class="section section-dashed">
                        <h3>Detalle de la Novedad</h3>
                        
                        <!-- Descripción -->
                        ${nov.DESCRIPCION ? `
                        <div style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; margin-bottom: 8px;">
                            <div style="display: flex; align-items: flex-start; gap: 10px;">
                                <div style="width: 26px; height: 26px; min-width: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">

                                </div>

                                    <p style="font-size: 11px; line-height: 1.6; color: #1e293b; margin: 0; font-weight: 500; text-transform: uppercase;">
                                        ${nov.DESCRIPCION}
                                    </p>
                                </div>
                            </div>

                        <!-- Información Rápida -->
                        <div style="display: flex; background: #fdfdfe; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; margin-bottom: 8px;">
                            <div style="flex: 1; padding: 8px 10px; display: flex; align-items: center; gap: 8px; border-right: 1px solid #e2e8f0;">
                                <div style="width: 26px; height: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">
                                    <i class="fas fa-boxes-stacked"></i>
                                </div>
                                <div>
                                    <p style="text-transform: uppercase; font-size: 8px; font-weight: 800; color: #3F51B5; margin: 0; letter-spacing: 0.3px;">CANTIDAD</p>
                                    <p style="font-size: 13px; font-weight: 800; color: #333; margin: 0; line-height: 1.2;">
                                        ${nov.CANTIDAD_SOLICITADA || '0'}
                                    </p>
                                </div>
                            </div>
                            <div style="flex: 1; padding: 8px 10px; display: flex; align-items: center; gap: 8px; ${nov.TIPO_NOVEDAD ? 'border-right: 1px solid #e2e8f0;' : ''}">
                                <div style="width: 26px; height: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">
                                    <i class="fas fa-map-location-dot"></i>
                                </div>
                                <div>
                                    <p style="text-transform: uppercase; font-size: 8px; font-weight: 800; color: #3F51B5; margin: 0; letter-spacing: 0.3px;">ÁREA</p>
                                    <p style="font-size: 13px; font-weight: 800; color: #333; margin: 0; line-height: 1.2;">${nov.AREA || 'N/A'}</p>
                                </div>
                            </div>
                            ${nov.TIPO_NOVEDAD ? `
                            <div style="flex: 1; padding: 8px 10px; display: flex; align-items: center; gap: 8px;">
                                <div style="width: 26px; height: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">
                                    <i class="fas fa-exclamation-triangle"></i>
                                </div>
                                <div>
                                    <p style="text-transform: uppercase; font-size: 8px; font-weight: 800; color: #3F51B5; margin: 0; letter-spacing: 0.3px;">TIPO</p>
                                    <p style="font-size: 13px; font-weight: 800; color: #333; margin: 0; line-height: 1.2;">${nov.TIPO_NOVEDAD}</p>
                                </div>
                            </div>
                            ` : ''}
                        </div>

                        <!-- Detalle Específico -->
                        ${formatearDetalleEspecifico(nov)}
                    </div>

                    <!-- Cobros y Entregas -->
                    <div style="display: flex; gap: 10px;">
                        <div class="opciones-cobro" style="flex: 2; margin: 0;">
                            <h3 style="text-align: center; margin-bottom: 6px;">Opciones de Cobro</h3>
                            <div style="display: flex; justify-content: space-between; font-size: 9px; font-weight: 600;">
                                <div class="opcional-item">
                                    TALLER: 
                                    <span style="${nov.COBRO === 'TALLER' ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${nov.COBRO === 'TALLER' ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}
                                    </span>
                                </div>
                                <div class="opcional-item">
                                    LÍNEA: 
                                    <span style="${nov.COBRO === 'LINEA' ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${nov.COBRO === 'LINEA' ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}
                                    </span>
                                </div>
                                <div class="opcional-item">
                                    REFERENCIA: 
                                    <span style="${nov.COBRO === 'REFERENCIA' ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${nov.COBRO === 'REFERENCIA' ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}
                                    </span>
                                </div>
                                <div class="opcional-item">
                                    FICHA: 
                                    <span style="${nov.COBRO === 'FICHA' ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${nov.COBRO === 'FICHA' ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}
                                    </span>
                                </div>
                                <div class="opcional-item">
                                    OTROS: 
                                    <span style="${nov.COBRO === 'PERSONALIZADO' ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${nov.COBRO === 'PERSONALIZADO' ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}
                                    </span>
                                </div>

                        </div>
                        <div class="opciones-cobro" style="flex: 1; margin: 0;">
                            <h3 style="text-align: center; margin-bottom: 6px;">Entrega</h3>
                            <div style="text-align: center; font-size: 9px; font-weight: 600;">
                                <div class="opcional-item">
                                    MANO A MANO: 
                                    <span style="${(nov.COBRO === 'MANO_A_MANO' || nov.COBRO === 'ENTREGA') ? 'background: #3F51B5; color: white; display: inline-flex; align-items: center; justify-content: center;' : ''}">
                                        ${(nov.COBRO === 'MANO_A_MANO' || nov.COBRO === 'ENTREGA') ? '<i class="fas fa-check" style="font-size: 10px;"></i>' : ''}

                    ${nov.COMENTARIOS ? `
                    <div class="section section-dashed" style="margin-top: 8px;">
                        <h3>COMENTARIOS</h3>

                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div style="width: 26px; height: 26px; min-width: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">
                                    <i class="fas fa-comment-dots"></i>
                                </div>
                                <div style="flex: 1;">
                                    <p style="font-size: 11px; line-height: 1.6; color: #1e293b; margin: 0; font-weight: 500;">
                                        ${nov.COMENTARIOS}

                    ` : ''}

                <!-- FIRMAS (Footer invariable al final de la página) -->
                <div class="firmas" style="margin-top: 15px; padding-top: 8px;">
                    <div class="firma-box">
                        <div class="firma-line"></div>
                        <p class="firma-leyenda">FIRMA DE ACEPTACIÓN</p>
                        <p style="font-size: 9px; color: #666; font-weight: 700;">Coordinador del Área</p>
                    </div>
                    <div class="firma-box">
                        <div class="firma-line"></div>
                        <p class="firma-leyenda">FIRMA DE AUTORIZACIÓN</p>
                        <p style="font-size: 9px; color: #666; font-weight: 700;">Dirección / Auditoría de Control</p>
                    </div>
                </div>
            `;
            document.getElementById('reportContent').innerHTML = html;
        }

        function formatearTelefono(telefono) {
            if (!telefono) return 'N/A';
            
            // Limpiar el teléfono de cualquier formato previo
            const limpio = telefono.toString().replace(/\D/g, '');
            
            // Si tiene 10 dígitos (número colombiano sin código de país)
            if (limpio.length === 10) {
                return `+57 (${limpio.substring(0, 3)}) ${limpio.substring(3, 6)}-${limpio.substring(6)}`;
            }
            // Si tiene 12 dígitos (con código de país 57)
            else if (limpio.length === 12 && limpio.startsWith('57')) {
                const numero = limpio.substring(2);
                return `+57 (${numero.substring(0, 3)}) ${numero.substring(3, 6)}-${numero.substring(6)}`;
            }
            // Si tiene 11 dígitos y empieza con 1 (puede ser error de tipeo)
            else if (limpio.length === 11 && limpio.startsWith('1')) {
                const numero = limpio.substring(1);
                return `+57 (${numero.substring(0, 3)}) ${numero.substring(3, 6)}-${numero.substring(6)}`;
            }
            
            // Si no coincide con ningún formato, devolver tal cual
            return telefono;
        }

        function formatearCedulaNit(numero) {
            if (!numero) return 'N/A';
            
            // Limpiar el número de cualquier formato previo
            const limpio = numero.toString().replace(/\D/g, '');
            
            // Formatear con separadores de miles
            return limpio.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function parsearFechaLatina(dateString) {
            if (!dateString) return null;
            if (dateString instanceof Date) return dateString;

            if (typeof dateString === 'string') {
                const cleaned = dateString.toLowerCase().trim();

                // --- 1. SOPORTE PARA FORMATO SISPRO "02-mar-26" ---
                if (cleaned.includes('-')) {
                    const parts = cleaned.split('-');
                    if (parts.length === 3) {
                        const dia = parseInt(parts[0], 10);
                        const mesNom = parts[1].substring(0, 3);
                        let año = parseInt(parts[2], 10);

                        if (año < 100) año += 2000;

                        const mesesMap = {
                            'ene': 0, 'feb': 1, 'mar': 2, 'abr': 3, 'may': 4, 'jun': 5,
                            'jul': 6, 'ago': 7, 'sep': 8, 'oct': 9, 'nov': 10, 'dic': 11
                        };

                        if (mesesMap.hasOwnProperty(mesNom) && !isNaN(dia) && !isNaN(año)) {
                            return new Date(año, mesesMap[mesNom], dia);
                        }
                    }
                }

                // --- 2. SOPORTE PARA FORMATO LATINO "10/3/2026, 21:16:21" ---
                if (cleaned.includes('/')) {
                    const str = cleaned.split(',')[0].trim();
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const d = parseInt(parts[0], 10);
                        const m = parseInt(parts[1], 10) - 1;
                        const y = parseInt(parts[2], 10);

                        let hr = 0, min = 0, sec = 0;
                        if (dateString.includes(',')) {
                            const timeParts = dateString.split(',')[1].trim().split(':');
                            if (timeParts.length >= 2) {
                                hr = parseInt(timeParts[0], 10);
                                min = parseInt(timeParts[1], 10);
                                sec = timeParts[2] ? parseInt(timeParts[2], 10) : 0;
                            }
                        }
                        return new Date(y, m, d, hr, min, sec);
                    }
                }

                const dt = new Date(dateString);
                if (!isNaN(dt.getTime())) return dt;
            }
            const dt = new Date(dateString);
            return isNaN(dt.getTime()) ? null : dt;
        }

        function formatearFecha(dateString) {
            const d = parsearFechaLatina(dateString);
            if (!d) return dateString || '';
            let format = d.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
            return format.charAt(0).toUpperCase() + format.slice(1);
        }

        function formatearHora(dateString) {
            const d = parsearFechaLatina(dateString);
            if (!d) return '';
            return d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }

        function calcularDiasHabilesHastaHoy(fechaInicioStr) {
            const d1 = parsearFechaLatina(fechaInicioStr);
            if (!d1) return null;

            let start = new Date(d1);
            let end = new Date();

            if (start > end) return 0; // Es futuro

            start.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);

            let count = 0;
            let current = new Date(start);
            current.setDate(current.getDate() + 1); // Contar desde el día siguiente a la "salida"

            while (current <= end) {
                const day = current.getDay();
                if (day !== 0 && day !== 6) {
                    count++;
                }
                current.setDate(current.getDate() + 1);
            }
            return count;
        }

        /**
         * Formatea el detalle específico según el área y tipo de solicitud

        function formatearDetalleEspecifico(nov) {

                    `;

                // CÓDIGOS - Unidades específicas
                else if (detalle.tipo_solicitud === 'UNIDADES' && detalle.items && detalle.items.length > 0) {
                    html += `
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">

                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">Talla</th>
                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">Color</th>
                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">Cantidad</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    detalle.items.forEach((item, idx) => {
                        html += `
                            <tr style="border-bottom: 1px solid #f1f5f9;">
                                <td style="padding: 4px 8px; text-align: center; font-size: 10px; color: #64748b; font-weight: 600;">${idx + 1}</td>
                                <td style="padding: 4px 8px; text-align: center; font-size: 10px; color: #1e293b; font-weight: 700;">${item.talla}</td>

                                <td style="padding: 4px 8px; text-align: center; font-size: 11px; color: #3F51B5; font-weight: 800;">${item.cantidad}</td>

                    });
                    html += `
                            </tbody>
                        </table>
                    `;
                }
                // INSUMOS, CORTE, TELAS - Lista de items
                else if (detalle.items && Array.isArray(detalle.items) && detalle.items.length > 0) {
                    const iconMap = {
                        'INSUMOS': 'fa-tags',
                        'CORTE': 'fa-cut',
                        'TELAS': 'fa-scroll'
                    };
                    const icon = iconMap[area] || 'fa-list';
                    
                    html += `
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                            <div style="width: 26px; height: 26px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3F51B5; font-size: 11px;">

                            </div>
                            <div>
                                <p style="font-size: 8px; font-weight: 800; color: #3F51B5; text-transform: uppercase; margin: 0; letter-spacing: 0.3px;">Detalle de ${area}</p>
                                <p style="font-size: 9px; font-weight: 400; color: #64748b; margin: 0;">${detalle.items.length} ítem${detalle.items.length !== 1 ? 's' : ''} registrado${detalle.items.length !== 1 ? 's' : ''}</p>
                            </div>
                        </div>
                        <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 4px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.04);">
                            <thead>
                                <tr style="background: #f1f5f9;">
                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">#</th>
                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">Tipo</th>
                                    <th style="padding: 4px 8px; text-align: center; font-size: 8px; font-weight: 800; color: #475569; text-transform: uppercase; border-bottom: 1px solid #e2e8f0;">Cantidad</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    detalle.items.forEach((item, idx) => {
                        html += `
                            <tr style="border-bottom: 1px solid #f1f5f9;">
                                <td style="padding: 4px 8px; text-align: center; font-size: 10px; color: #64748b; font-weight: 600;">${idx + 1}</td>
                                <td style="padding: 4px 8px; text-align: center; font-size: 10px; color: #1e293b; font-weight: 700;">${item.tipo}</td>
                                <td style="padding: 4px 8px; text-align: center; font-size: 11px; color: #3F51B5; font-weight: 800;">${item.cantidad}</td>
                            </tr>
                        `;
                    });
                    html += `
                            </tbody>
                        </table>
                    `;
                }
                
                html += '</div>';
                return html;
                
            } catch (e) {
                console.error('[formatearDetalleEspecifico] Error:', e);
                return '';
            }
        }
    </script>
