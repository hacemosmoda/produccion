<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Seguro - MAP Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #3f51b5;
            --color-primary-dark: #3949ab;
            --color-primary-shadow: rgba(63, 81, 181, 0.15);
            --color-text-main: #1e293b;
            --color-text-label: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ── Login Card ── */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header { margin-bottom: 32px; }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--color-primary);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            color: white;
            font-size: 30px;
            box-shadow: 0 8px 16px rgba(63, 81, 181, 0.2);
        }

        .login-subtitle {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-primary) 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Formulario ── */
        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--color-text-label); margin-bottom: 8px; margin-left: 4px; }
        
        .form-group input {
            width: 100%;
            height: 54px;
            padding: 0 18px 0 46px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--color-primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--color-primary-shadow);
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 41px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .btn-auth-primary {
            width: 100%;
            height: 54px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-auth-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(63, 81, 181, 0.3);
        }

        /* ── Biometría ── */
        .btn-biometric {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 24px;
            color: var(--color-primary);
            cursor: pointer;
            display: none; /* Se activa por JS */
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.25s;
            margin-bottom: 24px;
        }

        .btn-biometric:hover {
            border-color: var(--color-primary);
            background: #fff;
            transform: translateY(-2px);
        }

        .btn-biometric i { font-size: 40px; }
        .btn-biometric span { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .auth-error {
            background: #fff1f2;
            border: 1px solid #fda4af;
            color: #e11d48;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        /* ── Modal ── */
        #biometric-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
        }

        .modal-card {
            background: white; border-radius: 28px; padding: 40px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .modal-icon {
            width: 80px; height: 80px; border-radius: 24px;
            background: rgba(63, 81, 181, 0.08);
            display: inline-flex; align-items: center; justify-content: center;
            color: var(--color-primary); font-size: 36px; margin-bottom: 20px;
        }

        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-modal { flex: 1; height: 48px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-skip { background: #f1f5f9; color: #64748b; }
        .btn-activate { background: var(--color-primary); color: white; }

        /* ── Spinner ── */
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-shield-halved"></i>
            </div>
            <p class="login-subtitle">Acceso Pro</p>
        </div>

        <div id="authError" class="auth-error">
            <i class="fas fa-circle-exclamation"></i>
            <span id="errorText"></span>
        </div>

        <!-- Botón Biométrico Estilo 'Otro' -->
        <button id="btnBiometric" class="btn-biometric">
            <i id="bioIcon" class="fas fa-fingerprint"></i>
            <span id="bioLabel">Cargando...</span>
        </button>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label>IDENTIFICACIÓN</label>
                <i class="fas fa-user input-icon"></i>
                <input type="email" id="email" placeholder="nombre@empresa.com" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>CONTRASEÑA</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="loginBtn" class="btn-auth-primary">
                INGRESAR <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="margin-top: 30px; font-size: 11px; color: #94a3b8; font-weight: 600;">
            Sincronización segura con Supabase Cloud
        </div>
    </div>

    <!-- Modal de Registro Biométrico (Estilo 'Otro') -->
    <div id="biometric-modal">
        <div class="modal-card">
            <div class="modal-icon">
                <i id="modalIcon" class="fas fa-fingerprint"></i>
            </div>
            <h3 id="modalTitle">Activar Biometría</h3>
            <p style="color: #64748b; font-size: 14px; margin-top: 8px;">Accede más rápido usando la seguridad nativa de tu dispositivo.</p>
            <div class="modal-actions">
                <button class="btn-modal btn-skip" id="btnSkip">AHORA NO</button>
                <button class="btn-modal btn-activate" id="btnActivate">ACTIVAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './src/config/supabase.js'

        const btnBiometric = document.getElementById('btnBiometric');
        const loginForm = document.getElementById('loginForm');
        const authError = document.getElementById('authError');
        const errorText = document.getElementById('errorText');
        const loginBtn = document.getElementById('loginBtn');
        const bioIcon = document.getElementById('bioIcon');
        const bioLabel = document.getElementById('bioLabel');
        const bioModal = document.getElementById('biometric-modal');

        // 1. Detección de Dispositivo Nativo (Lógica de 'Otro')
        async function detectDevice() {
            if (!window.PublicKeyCredential) return;
            const isAvailable = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (!isAvailable) return;

            const ua = navigator.userAgent.toLowerCase();
            if (/iphone|ipad/.test(ua)) {
                bioIcon.className = 'fas fa-face-smile';
                bioLabel.textContent = 'Acceso con Face ID';
            } else if (/mac/.test(ua)) {
                bioIcon.className = 'fas fa-fingerprint';
                bioLabel.textContent = 'Acceso con Touch ID';
            } else if (/windows/.test(ua)) {
                bioIcon.className = 'fas fa-shield-halved';
                bioLabel.textContent = 'Windows Hello';
            } else {
                bioIcon.className = 'fas fa-fingerprint';
                bioLabel.textContent = 'Biometría';
            }
            
            // Mostrar botón si hay una sesión previa o intención de uso
            btnBiometric.style.display = 'flex';
        }

        // 2. Login con Biometría (Seguro con Supabase)
        btnBiometric.onclick = async () => {
            btnBiometric.disabled = true;
            try {
                const { data, error } = await supabase.auth.signInWithPasskey();
                if (error) throw error;
                if (data.session) window.location.href = 'index.html';
            } catch (err) {
                showError('Registra primero tu huella en este dispositivo.');
                btnBiometric.disabled = false;
            }
        };

        // 3. Login Normal + Oferta de Registro (Estilo 'Otro')
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> VALIDANDO...';
            authError.style.display = 'none';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'INGRESAR <i class="fas fa-arrow-right"></i>';
            } else {
                // Login exitoso -> Ofrecer Registro Biométrico si es compatible
                checkEnrollment();
            }
        };

        async function checkEnrollment() {
            if (window.PublicKeyCredential) {
                const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                if (available) {
                    bioModal.style.display = 'flex';
                    return;
                }
            }
            window.location.href = 'index.html';
        }

        document.getElementById('btnSkip').onclick = () => window.location.href = 'index.html';
        
        document.getElementById('btnActivate').onclick = async () => {
            const btn = document.getElementById('btnActivate');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span>';
            btn.disabled = true;

            try {
                // 1. Obtener el desafío del servidor de Supabase
                const { data: { session } } = await supabase.auth.getSession();
                const { SUPABASE_URL, SUPABASE_ANON_KEY } = await import('./src/config/supabase.js');

                // Si la función nativa falla, usamos el protocolo REST de Supabase directo
                let response;
                if (typeof supabase.auth.addPasskey === 'function') {
                    response = await supabase.auth.addPasskey();
                } else {
                    // LLAMADA DIRECTA AL API (Simulando addPasskey)
                    // Este es el flujo que el SDK debería hacer internamente
                    const res = await fetch(`${SUPABASE_URL}/auth/v1/passkey/enroll`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${session.access_token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    response = await res.json();
                }

                if (response.error) throw response.error;

                alert("✅ ¡Dispositivo vinculado! Ya puedes entrar con biometría.");
                window.location.href = 'index.html';
            } catch (err) {
                console.error("Error Biometría:", err);
                alert("Aviso: Para activar la biometría, Supabase requiere que este dominio sea seguro (HTTPS o localhost). " + err.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
                window.location.href = 'index.html';
            }
        };

        function showError(msg) {
            errorText.textContent = msg;
            authError.style.display = 'flex';
        }

        detectDevice();
    </script>
</body>
</html>
