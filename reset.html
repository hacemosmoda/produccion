<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
    <title>Restablecer Contraseña - Grupo TDM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    
    <style>
        .validation {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .v-item {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .v-item i {
            font-size: 0.8rem;
        }

        .v-item.success {
            color: #10b981;
            font-weight: 500;
        }

        .v-item.error {
            color: #ef4444;
        }

        .token-warning {
            background: #fef3c7;
            border: 1px solid #fde68a;
            color: #92400e;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (max-width: 400px) {
            .validation {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="auth-shield-pass login-body">
    <!-- ── Fondo de partículas ── -->
    <div id="particles-js"></div>

    <div class="login-page-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="icons/app.svg" alt="Logo TMD" class="login-logo">
                <div class="brand-divider"></div>
                <p class="login-subtitle">RESTABLECER CONTRASEÑA</p>
            </div>

            <div class="auth-section">
                <div id="tokenNotice" class="token-warning" style="display: none;">
                    <i class="fas fa-triangle-exclamation"></i>
                    Enlace no válido o expirado. Solicita uno nuevo.
                </div>

                <form id="resetForm">
                    <div class="form-floating-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="p1" placeholder="Contraseña Nueva (Mínimo 8 caracteres)" required autocomplete="new-password">
                        <i class="fas fa-eye toggle-pass" onclick="togglePassword('p1')"></i>
                    </div>

                    <div class="form-floating-group">
                        <i class="fas fa-shield-halved input-icon"></i>
                        <input type="password" id="p2" placeholder="Confirmar Contraseña" required autocomplete="off">
                        <i class="fas fa-eye toggle-pass" onclick="togglePassword('p2')"></i>
                    </div>

                    <div class="validation">
                        <div id="v-len" class="v-item"><i class="fas fa-circle-dot"></i> 8+ caracteres</div>
                        <div id="v-up" class="v-item"><i class="fas fa-circle-dot"></i> Una mayúscula</div>
                        <div id="v-low" class="v-item"><i class="fas fa-circle-dot"></i> Una minúscula</div>
                        <div id="v-num" class="v-item"><i class="fas fa-circle-dot"></i> Un número</div>
                        <div id="v-match" class="v-item" style="grid-column: span 2;">
                            <i class="fas fa-circle-dot"></i> Las contraseñas coinciden
                        </div>
                    </div>

                    <button type="submit" id="saveBtn" class="btn-auth-primary" disabled>
                        <span class="btn-text">ACTUALIZAR CONTRASEÑA</span>
                        <i class="fas fa-check"></i>
                    </button>

                    <div id="alert" style="margin-top: 1rem; padding: 0.75rem; border-radius: 10px; font-size: 0.85rem; text-align: center; display: none;"></div>
                </form>

                <div class="auth-footer-links">
                    <a href="login.html">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>

        <div class="login-footer-credits">
            <p>Developed by Andrés Mendoza © 2026</p>
            <p class="system-version">v2.4.0 • Enterprise Edition</p>
        </div>
    </div>

    <!-- ── Vendor Scripts ── -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ── App Logic ── -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/particles-config.js"></script>
    
    <script>
        // Inicialización al cargar
        window.onload = () => {
            if (typeof initParticles === 'function') initParticles();
            validateTokenOnLoad();
        };

        const inp1 = document.getElementById('p1');
        const inp2 = document.getElementById('p2');
        const btn = document.getElementById('saveBtn');
        const alert = document.getElementById('alert');
        const tokenNotice = document.getElementById('tokenNotice');

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            tokenNotice.style.display = 'flex';
            btn.disabled = true;
            inp1.disabled = true;
            inp2.disabled = true;
        }

        // Validar token al cargar la página
        async function validateTokenOnLoad() {
            if (!token) return;

            try {
                const supabase = window.getSupabaseClient();
                
                const { data, error } = await supabase.functions.invoke('password-reset', {
                    body: {
                        action: 'VALIDAR_TOKEN',
                        token: token
                    }
                });

                if (error || !data.success) {
                    tokenNotice.innerHTML = '<i class="fas fa-triangle-exclamation"></i> ' + (data?.message || 'Enlace no válido o expirado. Solicita uno nuevo.');
                    tokenNotice.style.display = 'flex';
                    btn.disabled = true;
                    inp1.disabled = true;
                    inp2.disabled = true;
                }
            } catch (err) {
                tokenNotice.innerHTML = '<i class="fas fa-triangle-exclamation"></i> Error al validar el enlace. Solicita uno nuevo.';
                tokenNotice.style.display = 'flex';
                btn.disabled = true;
                inp1.disabled = true;
                inp2.disabled = true;
            }
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = event.target;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function validate() {
            const v = inp1.value;
            const v2 = inp2.value;

            const checks = {
                len: v.length >= 8,
                up: /[A-Z]/.test(v),
                low: /[a-z]/.test(v),
                num: /[0-9]/.test(v),
                match: v.length > 0 && v === v2
            };

            for (const [key, ok] of Object.entries(checks)) {
                const el = document.getElementById('v-' + key);
                const icon = el.querySelector('i');
                if (v.length === 0 && key !== 'match') {
                    el.className = 'v-item';
                    icon.className = 'fas fa-circle-dot';
                } else {
                    el.className = ok ? 'v-item success' : 'v-item error';
                    icon.className = ok ? 'fas fa-circle-check' : 'fas fa-circle-xmark';
                }
            }

            btn.disabled = !(checks.len && checks.up && checks.low && checks.num && checks.match && token);
        }

        inp1.addEventListener('input', validate);
        inp2.addEventListener('input', validate);

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (btn.disabled) return;

            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';
            alert.style.display = 'none';

            try {
                const supabase = window.getSupabaseClient();
                
                const { data, error } = await supabase.functions.invoke('password-reset', {
                    body: {
                        action: 'CONFIRMAR_RESETEO',
                        token: token,
                        newPassword: inp1.value
                    }
                });

                if (error) {
                    throw new Error(error.message || 'Error al conectar con el servidor');
                }

                if (!data.success) {
                    throw new Error(data.message || 'Error al actualizar la contraseña');
                }

                Swal.fire({
                    title: '¡Contraseña Actualizada!',
                    text: 'Su contraseña ha sido restaurada correctamente. Redirigiendo al inicio de sesión...',
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false,
                    confirmButtonColor: '#3F51B5'
                }).then(() => {
                    window.location.href = 'login.html';
                });

            } catch (err) {
                alert.className = 'alert-error';
                alert.style.background = '#fee2e2';
                alert.style.color = '#b91c1c';
                alert.style.border = '1px solid #fecaca';
                alert.innerText = err.message || 'Error al actualizar la contraseña';
                alert.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });
    </script>
</body>
</html>
