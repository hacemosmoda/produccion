<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <title>En Proceso - Grupo TDM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"></noscript>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"></noscript>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.35/dist/codicon.css"></noscript>

  <link rel="stylesheet" href="css/components.css">

  <!-- Escudo de Seguridad -->
  <script>
    (function(){
      const s = localStorage.getItem('sispro_user');
      if (!s || s === 'undefined' || s === 'null') { window.location.replace('login.html'); return; }
      try { const u = JSON.parse(s); if (!u || u.ROL !== 'ADMIN') window.location.replace('index.html'); }
      catch(e) { window.location.replace('login.html'); }
    })();
  </script>

  <style>
    body { padding-top: 0; color: #1e293b; font-family: 'Inter', sans-serif; }

    .wrapper-dashboard {
      width: 96%; max-width: 560px;
      margin: 80px auto 2rem; padding: 2rem;
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 10;
    }

    @media (max-width: 767px) {
      .wrapper-dashboard {
        padding: 1.5rem; width: 100%;
        border-radius: 0; border-left: none; border-right: none;
        box-shadow: none; margin-top: 60px;
      }
    }

    /* Drop Zone */
    .drop-zone-label {
      display: block; padding: 36px 24px;
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      cursor: pointer; transition: all 0.25s ease;
      text-align: center; margin-bottom: 16px;
    }
    .drop-zone-label:hover {
      border-color: var(--color-primary); background: rgba(238,240,251,0.6);
      transform: translateY(-1px); box-shadow: 0 6px 20px rgba(63,81,181,0.1);
    }
    .drop-zone-label i { font-size: 40px; color: var(--color-text-muted); margin-bottom: 12px; display: block; }
    .drop-zone-label strong { display: block; font-size: 15px; color: var(--color-text-main); margin-bottom: 6px; font-weight: 600; text-transform: none; }
    .drop-zone-label span { display: block; font-size: 13px; color: var(--color-text-label); text-transform: none; }

    .format-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; background: rgba(255,255,255,0.7); border-radius: 20px;
      font-size: 11px; color: var(--color-text-muted);
      border: 1px solid var(--color-border); margin-top: 10px;
    }
    .format-badge i { color: var(--color-primary); font-size: 11px; }

    .resource-bar {
      padding: 11px 16px;
      background: rgba(248,250,252,0.7);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-md); border: 1px solid var(--color-border);
      font-size: 13px; color: var(--color-text-label);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 0;
    }

    /* KPI colapsable */
    .kpi-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      padding: 4px 0; margin-bottom: 8px;
      color: #94a3b8; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .kpi-toggle-btn i { font-size: 0.6rem; transition: transform 0.2s; }

    .kpi-grid {
      display: none;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px; margin-bottom: 16px;
      border: 1px solid var(--color-border);
      border-radius: 12px; overflow: hidden;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .kpi-cell {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px; gap: 2px;
      border-right: 1px solid var(--color-border);
    }
    .kpi-cell:nth-child(2n) { border-right: none; }
    .kpi-cell:nth-child(n+3) { border-top: 1px solid var(--color-border); }
    .kpi-val { font-size: 1.1rem; font-weight: 800; color: var(--color-text-main); }
    .kpi-lab { font-size: 0.58rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Timeline */
    .timeline { position: relative; margin-bottom: 28px; }
    .timeline::before { content:''; position:absolute; left:20px; top:22px; bottom:0; width:2px; background:var(--color-border); }
    .timeline-item { position:relative; margin-bottom:24px; padding-left:58px; }
    .timeline-marker {
      position:absolute; left:0; top:0; width:40px; height:40px;
      border-radius:10px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border:2px solid var(--color-border);
      display:flex; align-items:center; justify-content:center; z-index:2;
    }
    .timeline-marker i { font-size:14px; color:var(--color-text-muted); }
    .timeline-item.active .timeline-marker { background:rgba(254,245,231,0.7); border-color:#f0b429; }
    .timeline-item.active .timeline-marker i { color:#d89614; }
    .timeline-item.complete .timeline-marker { background:rgba(238,240,251,0.7); border-color:var(--color-primary); }
    .timeline-item.complete .timeline-marker i { color:var(--color-primary); }
    .timeline-item.pending .timeline-content { opacity:.45; }
    .timeline-content h3 { font-size:14px; font-weight:700; color:var(--color-text-main); margin:0 0 3px; }
    .timeline-description { font-size:12px; color:var(--color-text-label); margin:0 0 6px; }
    .timeline-details {
      font-size:12px; color:var(--color-text-main);
      padding:10px 14px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius:8px; border:1px solid rgba(226,232,240,0.6);
      min-height:38px; display:flex; align-items:center;
    }
    .timeline-item.pending .timeline-details { display:none; }
    .timeline-item.active .timeline-details,
    .timeline-item.complete .timeline-details { display:block; }

    .progress-bar-container { width:100%; height:7px; background:var(--color-border); border-radius:6px; overflow:hidden; margin-bottom:6px; }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--color-primary),var(--color-primary-dark)); width:0%; transition:width .4s ease; }
    .progress-text { font-size:11px; font-weight:700; color:var(--color-primary); text-align:center; }

    /* Footer */
    .action-footer { text-align:center; padding-top:16px; border-top:1px solid var(--color-border); display:none; }

    .hidden { display:none !important; }
  </style>
</head>

<body>

  <div class="wrapper-dashboard">

    <!-- ── Upload Section ── -->
    <div id="uploadSection">

      <label for="sisproFileInput" class="drop-zone-label">
        <input type="file" id="sisproFileInput" accept=".csv" style="display:none;">
        <i class="fas fa-cloud-upload-alt"></i>
        <strong>Arrastra tu archivo aquí</strong>
        <span>o haz clic para seleccionar</span>
        <div class="format-badge"><i class="fas fa-file-csv"></i> CSV UTF-8</div>
      </label>

      <div class="resource-bar">
        <i class="fas fa-link" style="color:#94a3b8; font-size:14px; flex-shrink:0;"></i>
        <a href="http://bit.ly/4vMNEhY" target="_blank"
           style="color:#475569; font-weight:500; text-decoration:none; text-transform:none;"
           onmouseover="this.style.color='#1e293b';" onmouseout="this.style.color='#475569';">
          ¿No tienes el archivo?
        </a>
      </div>
    </div>

    <!-- ── Tracking Section ── -->
    <div id="trackingSection" class="hidden">

      <!-- KPI colapsable -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <button class="kpi-toggle-btn" onclick="toggleSisproKPIs()" style="margin-bottom:0;">
          <span>Indicadores</span>
          <i class="fas fa-chevron-down" id="sisproKpiChevron"></i>
        </button>
      </div>
      <div class="kpi-grid" id="sisproKpiGrid" style="margin-bottom:16px;">
        <div class="kpi-cell">
          <span class="kpi-val" id="kpiTotal">-</span>
          <span class="kpi-lab">Total</span>
        </div>
        <div class="kpi-cell">
          <span class="kpi-val" style="color:var(--color-primary);" id="kpiSubidos">-</span>
          <span class="kpi-lab">Subidos</span>
        </div>
        <div class="kpi-cell">
          <span class="kpi-val" style="color:#e85d75;" id="kpiErrores">-</span>
          <span class="kpi-lab">Errores</span>
        </div>
        <div class="kpi-cell">
          <span class="kpi-val" style="color:#d89614;" id="kpiLotes">-</span>
          <span class="kpi-lab">Lotes</span>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline">
        <div class="timeline-item pending" id="step1">
          <div class="timeline-marker"><i class="fas fa-file-csv"></i></div>
          <div class="timeline-content">
            <h3>Lectura del archivo</h3>
            <p class="timeline-description">Parseando CSV y validando columnas</p>
            <div class="timeline-details" id="step1Details"></div>
          </div>
        </div>
        <div class="timeline-item pending" id="step2">
          <div class="timeline-marker"><i class="fas fa-trash-alt"></i></div>
          <div class="timeline-content">
            <h3>Limpieza de tabla</h3>
            <p class="timeline-description">Eliminando registros anteriores</p>
            <div class="timeline-details" id="step2Details"></div>
          </div>
        </div>
        <div class="timeline-item pending" id="step3">
          <div class="timeline-marker"><i class="fas fa-cloud-upload-alt"></i></div>
          <div class="timeline-content">
            <h3>Carga a Supabase</h3>
            <p class="timeline-description">Insertando registros nuevos</p>
            <div class="timeline-details" id="step3Details">
              <div class="progress-bar-container"><div class="progress-bar-fill" id="uploadProgress"></div></div>
              <p class="progress-text" id="uploadProgressText">0%</p>
            </div>
          </div>
        </div>
        <div class="timeline-item pending" id="step4">
          <div class="timeline-marker"><i class="fas fa-check-circle"></i></div>
          <div class="timeline-content">
            <h3>Proceso completado</h3>
            <div class="timeline-details" id="step4Details"></div>
          </div>
        </div>
      </div>

      <div class="action-footer" id="actionFooter">
        <button class="btn btn-primary" onclick="sisproReset()">
          <i class="fas fa-redo me-2"></i>Cargar otro archivo
        </button>
      </div>
    </div>

  </div>

  <!-- Optimización: skip descarga de usuarios en páginas de carga masiva -->
  <script>window._SKIP_AUTH_FETCH = true;</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10" defer></script>
  <script src="js/config.js" defer></script>
  <script src="js/api.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/sounds.js" defer></script>
  <script src="js/notifications.js" defer></script>
  <script src="js/particles-config.js" defer></script>

  <script>
    /* ── Estado ── */
    let sisproData = [];

    /* ── KPIs ── */
    function toggleSisproKPIs(forceOpen) {
      const grid = document.getElementById('sisproKpiGrid');
      const chevron = document.getElementById('sisproKpiChevron');
      if (!grid) return;
      const open = forceOpen !== undefined ? forceOpen : grid.style.display !== 'grid';
      grid.style.display = open ? 'grid' : 'none';
      if (chevron) chevron.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    /* ── Timeline helpers ── */
    function stepActive(n) {
      const el = document.getElementById('step'+n);
      if (el) el.className = 'timeline-item active';
    }
    function stepComplete(n, html) {
      const el = document.getElementById('step'+n);
      if (el) el.className = 'timeline-item complete';
      const d = document.getElementById('step'+n+'Details');
      if (d && html) d.innerHTML = html;
    }
    function stepDetail(n, html) {
      const d = document.getElementById('step'+n+'Details');
      if (d) d.innerHTML = html;
    }

    /* ── File input ── */
    document.getElementById('sisproFileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => startProcess(ev.target.result, file.name);
      reader.readAsText(file);
    });

    /* ── Proceso principal ── */
    async function startProcess(text, fileName) {
      // Cambiar a tracking section
      document.getElementById('uploadSection').classList.add('hidden');
      document.getElementById('trackingSection').classList.remove('hidden');

      /* PASO 1: Lectura */
      stepActive(1);
      stepDetail(1, '<i class="fas fa-spinner fa-spin"></i> Leyendo archivo...');

      await tick();

      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) {
        stepDetail(1, '<i class="fas fa-times-circle" style="color:#e85d75"></i> Archivo vacío o sin datos');
        return;
      }
      const headers = lines[0].split(';').map(h => h.trim());
      if (!headers.includes('OP')) {
        stepDetail(1, '<i class="fas fa-times-circle" style="color:#e85d75"></i> Falta columna "OP"');
        return;
      }

      sisproData = parseRows(lines, headers);
      document.getElementById('kpiTotal').textContent = sisproData.length.toLocaleString();
      document.getElementById('kpiLotes').textContent = sisproData.length.toLocaleString();

      stepComplete(1,
        `<i class="fas fa-check-circle" style="color:var(--color-primary)"></i> ` +
        `${sisproData.length.toLocaleString()} registros leídos de <strong>${fileName}</strong>`
      );

      await tick(300);

      /* PASO 2: Limpieza + inserción via Edge Function */
      stepActive(2);
      stepDetail(2, '<i class="fas fa-spinner fa-spin"></i> Limpiando tabla SISPRO...');

      await tick(200);

      try {
        stepComplete(2, '<i class="fas fa-check-circle" style="color:var(--color-primary)"></i> Tabla lista para recibir datos');

        /* PASO 3: Subida */
        stepActive(3);
        stepDetail(3, `
          <div class="progress-bar-container"><div class="progress-bar-fill" id="uploadProgress" style="width:10%"></div></div>
          <p class="progress-text" id="uploadProgressText">Enviando...</p>
        `);

        await tick(100);

        const response = await fetch(`${CONFIG.FUNCTIONS_URL}/operations`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accion: 'SYNC_SISPRO', records: sisproData })
        });

        const bar = document.getElementById('uploadProgress');
        const label = document.getElementById('uploadProgressText');
        if (bar) bar.style.width = '100%';
        if (label) label.textContent = '100%';

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.message || `HTTP ${response.status}`);
        }

        const res = await response.json();
        const uploaded = res.inserted || 0;
        const errors = res.errors?.length || 0;

        stepComplete(3,
          `<i class="fas fa-check-circle" style="color:var(--color-primary)"></i> ` +
          `${uploaded.toLocaleString()} registros insertados`
        );

        await tick(300);

        /* PASO 4: Completado */
        stepActive(4);
        stepComplete(4,
          errors === 0
            ? `<div style="color:#3f51b5;font-weight:600;"><i class="fas fa-check-circle"></i> Proceso completado exitosamente</div>`
            : `<div style="color:#e85d75;font-weight:600;"><i class="fas fa-exclamation-circle"></i> Completado con ${errors} errores</div>`
        );

        /* Actualizar KPIs y expandir */
        document.getElementById('kpiSubidos').textContent = uploaded.toLocaleString();
        document.getElementById('kpiErrores').textContent = errors.toLocaleString();
        toggleSisproKPIs(true);

        document.getElementById('actionFooter').style.display = 'block';

        if (uploaded > 0 && typeof loadSISPRO === 'function') {
          setTimeout(() => loadSISPRO(), 2000);
        }

      } catch (err) {
        stepComplete(2, `<i class="fas fa-times-circle" style="color:#e85d75"></i> Error: ${err.message}`);
        document.getElementById('actionFooter').style.display = 'block';
      }
    }

    /* ── Parseo CSV ── */
    function parseRows(lines, headers) {
      const dateCol  = ['FechaCorte','FSalidaConf','FEntregaConf'];
      const priceCol = ['pvp','TEMPLO DE LA MODA','BARRANCA','VALOR FACTURACION'];
      const numCol   = ['UndProg','UndCort','InvPlanta','InvBPT','Saldo BPT'];
      const txtCol   = ['NombrePlanta','Coleccion','Proceso','Genero','Tipo Tejido','Cuento'];
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].split(';').map(v => v.trim());
        if (vals.length < headers.length) continue;
        const row = {};
        headers.forEach((h, idx) => {
          const v = vals[idx] || '';
          if (dateCol.includes(h))       row[h] = parseDate(v);
          else if (priceCol.includes(h)) row[h] = parsePrice(v);
          else if (numCol.includes(h))   row[h] = parseInt(v) || 0;
          else if (h === 'Descripcion')  row[h] = normalizeDesc(v);
          else if (txtCol.includes(h))   row[h] = v.normalize('NFC').replace(/[\x00-\x1F\x7F]/g,'').trim();
          else                           row[h] = v;
        });
        rows.push(row);
      }
      return rows;
    }

    function parseDate(d) {
      if (!d?.trim()) return null;
      const c = d.trim();
      if (c.includes('/')) {
        const p = c.split('/');
        return p.length===3 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : null;
      }
      if (c.includes('-')) {
        const m={'ene':'01','feb':'02','mar':'03','abr':'04','may':'05','jun':'06','jul':'07','ago':'08','sep':'09','oct':'10','nov':'11','dic':'12'};
        const p=c.toLowerCase().split('-');
        if (p.length!==3||!m[p[1]]) return null;
        const y=parseInt(p[2])<50?'20'+p[2].padStart(2,'0'):'19'+p[2].padStart(2,'0');
        return `${y}-${m[p[1]]}-${p[0].padStart(2,'0')}`;
      }
      return null;
    }

    function parsePrice(s) {
      if (!s) return null;
      const n = parseInt(s.replace(/\$/g,'').replace(/\s/g,'').replace(/\./g,''));
      return isNaN(n) ? null : n;
    }

    function normalizeDesc(d) {
      if (!d) return d;
      let n = d.trim().toUpperCase()
        .replace(/\s+PROMOCION$/i,'').replace(/\s+PROMOCIO$/i,'').replace(/\s+PROMO$/i,'')
        .replace(/_/g,' ').trim();
      if (n==='TOP CROP') return 'CROPTOP';
      if (n==='JARDINERAS, BRAGAS,') return 'JARDINERAS';
      if (n.endsWith('ES')&&n.length>4) return n.slice(0,-2);
      if (n.endsWith('S')&&n.length>3&&!n.endsWith('LEGGINS')) return n.slice(0,-1);
      return n;
    }

    function tick(ms=50) { return new Promise(r => setTimeout(r, ms)); }

    /* ── Reset ── */
    function sisproReset() {
      sisproData = [];
      document.getElementById('sisproFileInput').value = '';
      document.getElementById('uploadSection').classList.remove('hidden');
      document.getElementById('trackingSection').classList.add('hidden');
      document.getElementById('actionFooter').style.display = 'none';
      toggleSisproKPIs(false);
      ['kpiTotal','kpiSubidos','kpiErrores','kpiLotes'].forEach(id => {
        document.getElementById(id).textContent = '-';
      });
    }
  </script>

</body>
</html>
